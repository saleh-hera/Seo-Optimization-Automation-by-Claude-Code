name: Agent Pages Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Check all 9 agent pages
        run: |
          agents=(a1 a2 a3 a4 a9 a10 a11 a12 a13)
          FAIL=0
          for slug in "${agents[@]}"; do
            STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" "https://aiagentsvault.tech/marketplace/$slug")
            if [ "$STATUS" = "200" ]; then
              echo "✅ /marketplace/$slug — $STATUS"
            else
              echo "❌ /marketplace/$slug — $STATUS (DOWN)"
              FAIL=1
            fi
          done
          exit $FAIL
