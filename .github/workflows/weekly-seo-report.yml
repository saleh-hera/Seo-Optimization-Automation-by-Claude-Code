name: Weekly SEO Report

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check all 9 agent pages are live
        run: |
          echo "## 🔍 Weekly SEO Health Report — $(date '+%Y-%m-%d')" >> report.md
          echo "" >> report.md
          echo "### Page Status (All 9 Agents)" >> report.md

          pages=(
            "https://aiagentsvault.tech"
            "https://aiagentsvault.tech/marketplace"
            "https://aiagentsvault.tech/marketplace/a1"
            "https://aiagentsvault.tech/marketplace/a2"
            "https://aiagentsvault.tech/marketplace/a3"
            "https://aiagentsvault.tech/marketplace/a4"
            "https://aiagentsvault.tech/marketplace/a9"
            "https://aiagentsvault.tech/marketplace/a10"
            "https://aiagentsvault.tech/marketplace/a11"
            "https://aiagentsvault.tech/marketplace/a12"
            "https://aiagentsvault.tech/marketplace/a13"
            "https://aiagentsvault.tech/sitemap.xml"
          )

          for page in "${pages[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$page")
            SPEED=$(curl -s -o /dev/null -w "%{time_total}" "$page")
            if [ "$STATUS" = "200" ]; then
              echo "- ✅ $page — $STATUS (${SPEED}s)" >> report.md
            else
              echo "- ❌ $page — $STATUS (NEEDS FIX)" >> report.md
            fi
          done

      - name: Check sitemap URL count
        run: |
          echo "" >> report.md
          echo "### Sitemap" >> report.md
          SITEMAP=$(curl -s https://aiagentsvault.tech/sitemap.xml)
          COUNT=$(echo "$SITEMAP" | grep -c "<url>" || true)
          echo "- URLs in sitemap: $COUNT" >> report.md
          echo "- Target: 11+ URLs (homepage + marketplace + 9 agents)" >> report.md
          if [ "$COUNT" -ge 11 ]; then
            echo "- ✅ Sitemap looks complete" >> report.md
          else
            echo "- ⚠️ Sitemap may be missing agent pages" >> report.md
          fi

      - name: Check schema markup on all agent pages
        run: |
          echo "" >> report.md
          echo "### Schema Markup" >> report.md
          for slug in a1 a2 a3 a4 a9 a10 a11 a12 a13; do
            PAGE=$(curl -s "https://aiagentsvault.tech/marketplace/$slug")
            if echo "$PAGE" | grep -q "application/ld+json"; then
              echo "- ✅ /marketplace/$slug — JSON-LD found" >> report.md
            else
              echo "- ❌ /marketplace/$slug — JSON-LD MISSING" >> report.md
            fi
          done

      - name: Check FAQ sections on agent pages
        run: |
          echo "" >> report.md
          echo "### FAQ Sections" >> report.md
          for slug in a1 a2 a3 a4 a9 a10 a11 a12 a13; do
            PAGE=$(curl -s "https://aiagentsvault.tech/marketplace/$slug")
            if echo "$PAGE" | grep -qi "faq\|frequently asked"; then
              echo "- ✅ /marketplace/$slug — FAQ found" >> report.md
            else
              echo "- ❌ /marketplace/$slug — FAQ MISSING" >> report.md
            fi
          done

      - name: Check homepage trust signals
        run: |
          echo "" >> report.md
          echo "### Homepage Trust Signals" >> report.md
          PAGE=$(curl -s https://aiagentsvault.tech)
          if echo "$PAGE" | grep -q "application/ld+json"; then
            echo "- ✅ JSON-LD schema on homepage" >> report.md
          else
            echo "- ❌ JSON-LD schema MISSING from homepage" >> report.md
          fi
          if echo "$PAGE" | grep -q "google-site-verification"; then
            echo "- ✅ Google verification tag present" >> report.md
          else
            echo "- ❌ Google verification tag MISSING" >> report.md
          fi
          if echo "$PAGE" | grep -q "FAQ\|faq"; then
            echo "- ✅ FAQ section on homepage" >> report.md
          else
            echo "- ❌ FAQ section MISSING from homepage" >> report.md
          fi
          if echo "$PAGE" | grep -q "179\|299\|399"; then
            echo "- ✅ Pricing visible on homepage" >> report.md
          else
            echo "- ❌ Pricing NOT visible on homepage" >> report.md
          fi

      - name: AEO / GEO checklist
        run: |
          echo "" >> report.md
          echo "### AEO / GEO Weekly Checklist" >> report.md
          echo "- [ ] Search ChatGPT: 'best AI receptionist for restaurants' — are we cited?" >> report.md
          echo "- [ ] Search Perplexity: 'AI voice agent for dental offices' — are we cited?" >> report.md
          echo "- [ ] Search Claude: 'affordable AI phone agent for small business' — are we cited?" >> report.md
          echo "- [ ] Search Google: 'AI Agents Vault' — what position?" >> report.md
          echo "- [ ] Check Google Search Console for new impressions this week" >> report.md
          echo "- [ ] Submit to 1 new directory (see seo/backlink-prospects.md)" >> report.md
          echo "" >> report.md
          echo "### Agent Pages to Prioritize This Week" >> report.md
          echo "- DentaDesk (/marketplace/a11) — highest-value dental market" >> report.md
          echo "- LexAssist (/marketplace/a10) — highest price point \$399/mo" >> report.md
          echo "- HomeConnect (/marketplace/a9) — large real estate market" >> report.md
          echo "" >> report.md
          echo "---" >> report.md
          echo "*Generated automatically every Monday 8am UTC by GitHub Actions*" >> report.md

      - name: Save report to seo folder
        run: |
          DATE=$(date '+%Y-%m-%d')
          mkdir -p seo
          cp report.md "seo/weekly-report-$DATE.md"

      - name: Commit report to repo
        run: |
          git config user.name "SEO Bot"
          git config user.email "seo-bot@aiagentsvault.tech"
          DATE=$(date '+%Y-%m-%d')
          git add "seo/weekly-report-$DATE.md"
          git diff --staged --quiet || git commit -m "Auto: Weekly SEO report $DATE"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print report
        run: cat report.md
